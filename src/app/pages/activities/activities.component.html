<div class="container py-5 mt-5">
    <div class="text-center mb-5 pt-4">
        <h1>Exciting Activities</h1>
        <p>Find the best things to do on your trip.</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-4 col-md-6" *ngFor="let act of activities">
            <div class="activity-card h-100">
                <h3>{{ act.title }}</h3>
                <p>{{ act.desc }}</p>
            </div>
        </div>
    </div>
</div>
